<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMBoostly — Login</title>

    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Tailwind + config -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Inter', 'system-ui', 'sans-serif'],
                        body: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        glow: '0 20px 80px rgba(99,102,241,0.25)',
                        'card': '0 25px 80px rgba(15,23,42,0.12)',
                        'input': '0 0 0 3px rgba(99,102,241,0.15)',
                    }
                }
            }
        }
    </script>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        /* ---------- Base ---------- */
        * {
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background:
                radial-gradient(circle at top left, rgba(99, 102, 241, .18), transparent 30%),
                radial-gradient(circle at top right, rgba(236, 72, 153, .14), transparent 26%),
                linear-gradient(180deg, #eef2ff 0%, #f8fafc 48%, #eef2ff 100%);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* ---------- Login Wrapper (flex container for image + card) ---------- */
        .login-wrapper {
            display: flex;
            position: relative;
            width: 100%;
            max-width: 940px;
            border-radius: 2.5rem;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(15, 23, 42, 0.10), 0 0 0 1px rgba(255, 255, 255, 0.3) inset;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: box-shadow 0.3s ease, transform 0.3s ease;
            min-height: 560px;
        }
        .login-wrapper:hover {
            transform: translateY(-2px);
            box-shadow: 0 40px 100px rgba(15, 23, 42, 0.14), 0 0 0 1px rgba(255, 255, 255, 0.4) inset;
        }

        /* Glow orbs behind wrapper */
        .login-wrapper::before {
            content: '';
            position: absolute;
            top: -80px;
            left: 30%;
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.12), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        .login-wrapper::after {
            content: '';
            position: absolute;
            bottom: -60px;
            right: 20%;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(217, 70, 239, 0.10), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .login-wrapper>* {
            position: relative;
            z-index: 1;
        }

        /* ---------- Image Panel (left) ---------- */
        .image-panel {
            flex: 1;
            min-width: 0;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
            transform: translateX(-100%);
            transition: transform 0.85s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2.5rem 0 0 2.5rem;
        }
        .image-panel.open {
            transform: translateX(0);
        }

        .image-panel .image-inner {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            position: relative;
            overflow: hidden;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.6), rgba(241, 245, 249, 0.4));
        }

        .image-panel .image-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.8s ease;
        }

        .image-panel.open .image-inner img {
            transform: scale(1);
        }

        .image-panel .image-inner .img-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.08), rgba(217, 70, 239, 0.05));
            pointer-events: none;
        }

        /* Decorative handle (now on the right side of the image panel) */
        .image-panel .door-handle {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 60px;
            background: linear-gradient(180deg, rgba(99, 102, 241, 0.4), rgba(217, 70, 239, 0.4));
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.15);
            z-index: 5;
            opacity: 0;
            transition: opacity 0.6s ease 0.4s;
        }
        .image-panel.open .door-handle {
            opacity: 1;
        }

        /* Shadow on the right edge */
        .image-panel::before {
            content: '';
            position: absolute;
            right: -2px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, rgba(99, 102, 241, 0.15), rgba(217, 70, 239, 0.10));
            z-index: 3;
            border-radius: 2px 0 0 2px;
            opacity: 0;
            transition: opacity 0.6s ease 0.3s;
        }
        .image-panel.open::before {
            opacity: 1;
        }

        /* ---------- Login Card (right) ---------- */
        .login-card {
            width: 100%;
            max-width: 440px;
            flex-shrink: 0;
            padding: 2.25rem 2rem 2.5rem;
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }

        /* ---------- Logo ---------- */
        .logo-link {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .logo-icon {
            display: flex;
            height: 48px;
            width: 48px;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            background: linear-gradient(135deg, #4f46e5, #d946ef);
            color: #fff;
            font-weight: 900;
            font-size: 1.5rem;
            flex-shrink: 0;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.25);
            transition: transform 0.3s ease;
        }
        .logo-icon:hover {
            transform: scale(1.05);
        }
        .logo-text {
            font-size: 1.65rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            color: #0f172a;
        }
        .logo-text span {
            background: linear-gradient(135deg, #4f46e5, #d946ef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ---------- Form ---------- */
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #475569;
            margin-bottom: 6px;
        }
        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 14px;
            border: 1.5px solid #e2e8f0;
            transition: all 0.25s ease;
            overflow: hidden;
        }
        .input-wrap:focus-within {
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.10);
            background: rgba(255, 255, 255, 0.85);
        }
        .input-wrap .input-icon {
            flex-shrink: 0;
            width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 1rem;
            transition: color 0.25s ease;
        }
        .input-wrap:focus-within .input-icon {
            color: #4f46e5;
        }
        .input-wrap input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 14px 16px 14px 0;
            font-size: 0.95rem;
            font-weight: 500;
            color: #0f172a;
            outline: none;
            font-family: 'Inter', system-ui, sans-serif;
            width: 100%;
            min-width: 0;
        }
        .input-wrap input::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }
        .input-wrap .toggle-password {
            flex-shrink: 0;
            width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 0.95rem;
            cursor: pointer;
            transition: color 0.2s ease;
            background: none;
            border: none;
            padding: 0;
        }
        .input-wrap .toggle-password:hover {
            color: #4f46e5;
        }

        /* Shake animation */
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            10% {
                transform: translateX(-10px);
            }
            30% {
                transform: translateX(10px);
            }
            50% {
                transform: translateX(-8px);
            }
            70% {
                transform: translateX(8px);
            }
            90% {
                transform: translateX(-4px);
            }
        }
        .input-wrap.shake {
            animation: shake 0.5s ease forwards;
        }
        .input-wrap.shake {
            border-color: #f87171;
            box-shadow: 0 0 0 4px rgba(248, 113, 113, 0.12);
        }
        .input-wrap.shake .input-icon {
            color: #f87171;
        }

        /* Error state (persistent) */
        .input-wrap.error {
            border-color: #f87171;
            background: rgba(248, 113, 113, 0.04);
        }
        .input-wrap.error .input-icon {
            color: #f87171;
        }
        .input-wrap.error:focus-within {
            border-color: #f87171;
            box-shadow: 0 0 0 4px rgba(248, 113, 113, 0.10);
        }

        /* ---------- Button ---------- */
        .btn-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #4f46e5, #d946ef);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Inter', system-ui, sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.25);
            position: relative;
            overflow: hidden;
            margin-top: 4px;
        }
        .btn-login:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 16px 48px rgba(99, 102, 241, 0.35);
        }
        .btn-login:active {
            transform: scale(0.97);
        }
        .btn-login:disabled {
            opacity: 0.7;
            pointer-events: none;
            transform: scale(0.98);
        }
        .btn-login .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .btn-login.loading .spinner {
            display: inline-block;
        }
        .btn-login.loading .btn-text {
            display: none;
        }
        .btn-login.loading .btn-icon {
            display: none;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .btn-login .btn-text {
            display: inline;
        }
        .btn-login .btn-icon {
            display: inline;
        }

        /* ---------- Custom 3D Curved Checkbox ---------- */
        .custom-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: #334155;
        }
        .custom-checkbox input[type="checkbox"] {
            display: none;
        }
        .checkmark {
            width: 22px;
            height: 22px;
            border-radius: 8px;
            background: #fff;
            border: 2px solid #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.04), 0 2px 4px rgba(0, 0, 0, 0.06);
            flex-shrink: 0;
        }
        .custom-checkbox input:checked+.checkmark {
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            border-color: #4f46e5;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.15), 0 4px 12px rgba(99, 102, 241, 0.30);
        }
        .custom-checkbox .checkmark i {
            color: #fff;
            font-size: 12px;
            opacity: 0;
            transform: scale(0.4);
            transition: all 0.2s ease;
        }
        .custom-checkbox input:checked+.checkmark i {
            opacity: 1;
            transform: scale(1);
        }
        .custom-checkbox:hover .checkmark {
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.06), 0 4px 8px rgba(0, 0, 0, 0.08);
            border-color: #94a3b8;
        }
        .custom-checkbox input:checked:hover+.checkmark {
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.20), 0 6px 16px rgba(99, 102, 241, 0.40);
        }

        /* ---------- Forgot Password Link ---------- */
        .forgot-password-link {
            font-size: 0.85rem;
            font-weight: 500;
            color: #64748b;
            transition: color 0.2s ease;
            text-decoration: none;
            white-space: nowrap;
        }
        .forgot-password-link:hover {
            color: #4f46e5;
            text-decoration: underline;
        }
        .forgot-password-link i {
            margin-right: 4px;
        }

        /* ---------- SSO Section ---------- */
        .sso-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 18px 0 16px;
        }
        .sso-divider::before,
        .sso-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }
        .sso-divider span {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #94a3b8;
            white-space: nowrap;
        }

        .sso-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: nowrap;
            justify-content: center;
        }
        .sso-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 12px;
            border: 1.5px solid #e2e8f0;
            background: rgba(255, 255, 255, 0.5);
            color: #475569;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: 'Inter', system-ui, sans-serif;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
            flex: 0 1 auto;
            min-width: 0;
        }
        .sso-btn:hover {
            background: #ffffff;
            border-color: #cbd5e1;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
        }
        .sso-btn .fab {
            font-size: 1.1rem;
        }
        .sso-btn.google:hover .fab {
            color: #ea4335;
        }
        .sso-btn.sso-coming {
            cursor: default;
            opacity: 0.7;
        }
        .sso-btn.sso-coming:hover {
            transform: none;
            box-shadow: none;
            background: rgba(255, 255, 255, 0.5);
            border-color: #e2e8f0;
        }
        .sso-btn.sso-coming .fas {
            font-size: 0.9rem;
        }

        @media (max-width: 480px) {
            .sso-btn {
                padding: 8px 12px;
                font-size: 0.75rem;
                gap: 4px;
            }
            .sso-btn .fab {
                font-size: 0.9rem;
            }
        }

        /* ---------- iOS Notification ---------- */
        .ios-notification {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(30, 30, 40, 0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 18px;
            padding: 14px 20px 14px 18px;
            min-width: 300px;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(255, 255, 255, 0.06) inset;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            align-items: center;
            gap: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .ios-notification.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0px);
        }
        .ios-notification .notif-icon {
            flex-shrink: 0;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #fff;
        }
        .ios-notification .notif-icon.success {
            background: linear-gradient(135deg, #34d399, #10b981);
        }
        .ios-notification .notif-icon.error {
            background: linear-gradient(135deg, #f87171, #ef4444);
        }
        .ios-notification .notif-icon.warning {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
        }
        .ios-notification .notif-icon.info {
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
        }
        .ios-notification .notif-content {
            flex: 1;
            min-width: 0;
        }
        .ios-notification .notif-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.01em;
        }
        .ios-notification .notif-message {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 1px;
            line-height: 1.3;
        }
        .ios-notification .notif-time {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.3);
            flex-shrink: 0;
            align-self: flex-start;
            margin-top: 2px;
        }
        .ios-notification .notif-close {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            padding: 4px 6px;
            font-size: 0.7rem;
            transition: color 0.2s;
            flex-shrink: 0;
            align-self: flex-start;
            margin-top: 2px;
        }
        .ios-notification .notif-close:hover {
            color: rgba(255, 255, 255, 0.6);
        }

        @media (max-width: 480px) {
            .ios-notification {
                min-width: 0;
                width: calc(100% - 32px);
                padding: 12px 16px;
                top: 16px;
                border-radius: 14px;
            }
            .ios-notification .notif-icon {
                width: 34px;
                height: 34px;
                font-size: 1rem;
            }
            .ios-notification .notif-title {
                font-size: 0.78rem;
            }
            .ios-notification .notif-message {
                font-size: 0.68rem;
            }
        }

        /* ---------- Responsive ---------- */
        @media (max-width: 480px) {
            .login-card {
                padding: 1.75rem 1.25rem 2rem;
            }
            .logo-text {
                font-size: 1.4rem;
            }
            .logo-icon {
                height: 42px;
                width: 42px;
                font-size: 1.3rem;
            }
            .sso-buttons {
                gap: 8px;
            }
        }

        /* ---------- Desktop: both panels visible ---------- */
        @media (min-width: 769px) {
            .login-wrapper {
                min-height: 560px;
            }
            .image-panel {
                flex: 1;
                min-width: 0;
                display: block;
            }
            .login-card {
                max-width: 440px;
            }
            .sso-btn {
                padding: 10px 24px;
            }
        }

        /* ---------- Mobile: image panel hidden ---------- */
        @media (max-width: 768px) {
            .login-wrapper {
                max-width: 440px;
                min-height: auto;
                border-radius: 2.5rem;
                overflow: hidden;
            }
            .image-panel {
                display: none !important;
            }
            .login-card {
                max-width: 100%;
                padding: 1.75rem 1.25rem 2rem;
            }
            .login-wrapper::before,
            .login-wrapper::after {
                display: none;
            }
            .sso-btn {
                padding: 8px 16px;
                font-size: 0.8rem;
            }
        }

        /* ---------- Background decoration ---------- */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: -1;
        }
        .bg-blob-1 {
            top: -10%;
            right: -8%;
            width: 500px;
            height: 500px;
            background: rgba(99, 102, 241, 0.12);
        }
        .bg-blob-2 {
            bottom: -12%;
            left: -6%;
            width: 450px;
            height: 450px;
            background: rgba(217, 70, 239, 0.08);
        }
        @media (max-width: 640px) {
            .bg-blob-1 {
                width: 300px;
                height: 300px;
                top: -5%;
            }
            .bg-blob-2 {
                width: 280px;
                height: 280px;
                bottom: -5%;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- iOS NOTIFICATION -->
    <!-- ============================================================ -->
    <div id="iosNotif" class="ios-notification" role="alert">
        <div class="notif-icon" id="notifIcon">
            <i class="fas fa-check"></i>
        </div>
        <div class="notif-content">
            <div class="notif-title" id="notifTitle">Success</div>
            <div class="notif-message" id="notifMessage">Action completed successfully.</div>
        </div>
        <span class="notif-time" id="notifTime">now</span>
        <button class="notif-close" id="notifClose" aria-label="Dismiss notification">
            <i class="fas fa-xmark"></i>
        </button>
    </div>

    <!-- ============================================================ -->
    <!-- BACKGROUND BLOBS -->
    <!-- ============================================================ -->
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>

    <!-- ============================================================ -->
    <!-- LOGIN WRAPPER (image panel + login card) -->
    <!-- ============================================================ -->
    <div class="login-wrapper" id="loginWrapper">

        <!-- ============================================================ -->
        <!-- IMAGE PANEL (left) - slides in like a door -->
        <!-- ============================================================ -->
        <div class="image-panel" id="imagePanel">
            <div class="door-handle"></div>
            <div class="image-inner">
                <img
                src="https://res.cloudinary.com/drgmxrudz/image/upload/v1783279208/blog/SMBoostly_login_img_1783279207.jpg"
                alt="SMBoostly Login Illustration"
                loading="lazy"
                />
                <div class="img-overlay"></div>
            </div>
        </div>

        <!-- ============================================================ -->
        <!-- LOGIN CARD (right) -->
        <!-- ============================================================ -->
        <div class="login-card">

            <!-- Logo Centered -->
            <div class="flex justify-center mb-6">
                <a href="#" class="logo-link">
                    <div class="logo-icon">S</div>
                    <div class="logo-text">SM<span>Boostly</span></div>
                </a>
            </div>

            <!-- Heading -->
            <div class="mb-6">
                <h1 class="text-2xl font-black tracking-tight text-slate-900">Welcome Back</h1>
                <p class="text-sm text-slate-500 mt-1">Sign in to your account to continue growing.</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" novalidate autocomplete="off">
                <!-- Email / Username -->
                <div class="form-group">
                    <label class="form-label" for="emailInput">
                        <i class="fas fa-envelope text-indigo-400 mr-1.5"></i> Email or Username
                    </label>
                    <div class="input-wrap" id="emailWrap">
                        <span class="input-icon"><i class="fas fa-user"></i></span>
                        <input
                        type="text"
                        id="emailInput"
                        placeholder="Enter your email or username"
                        autocomplete="username"
                        />
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <div class="flex items-center justify-between">
                        <label class="form-label" for="passwordInput">
                            <i class="fas fa-lock text-indigo-400 mr-1.5"></i> Password
                        </label>
                    </div>
                    <div class="input-wrap" id="passwordWrap">
                        <span class="input-icon"><i class="fas fa-key"></i></span>
                        <input
                        type="password"
                        id="passwordInput"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        />
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Keep me logged in & Forgot password (single line) -->
                <div class="flex items-center justify-between mt-3 mb-5">
                    <label class="custom-checkbox">
                        <input type="checkbox" id="keepLoggedIn" checked />
                        <span class="checkmark"><i class="fas fa-check"></i></span>
                        Keep me logged in
                    </label>
                    <a href="../../auth/reset/" class="forgot-password-link" data-notif="info" data-title="Reset Password" data-msg="A password reset link will be sent to your email.">
                        <i class="fas fa-question-circle"></i> Forgot password?
                    </a>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-icon"><i class="fas fa-sign-in-alt"></i></span>
                    <span class="btn-text">Sign In</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <!-- SSO Section (single line on mobile) -->
            <div class="sso-divider">
                <span>or continue with</span>
            </div>
            <div class="sso-buttons">
                <button class="sso-btn google" data-notif="info" data-title="Google Sign-In" data-msg="Google authentication is coming soon!">
                    <i class="fab fa-google"></i> Google
                </button>
                <button class="sso-btn sso-coming" data-notif="info" data-title="SSO Coming Soon" data-msg="Single Sign-On (SSO) will be available soon.">
                    <i class="fas fa-shield-alt"></i> SSO
                </button>
            </div>

            <!-- Bottom Auth Links (Single line: No account? Create an account) -->
            <div class="text-center mt-6">
                <p class="text-sm text-slate-600">No account? <a href="../../auth/register/" class="font-semibold text-indigo-600 hover:text-indigo-800 transition" data-notif="info" data-title="Create Account" data-msg="Head over to the sign-up page to create your free account."><i class="fas fa-user-plus mr-1.5"></i> Create an account</a></p>
            </div>

        </div>

    </div>

    <!-- ============================================================ -->
    <!-- SCRIPTS -->
    <!-- ============================================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================================
            // iOS NOTIFICATION SYSTEM
            // ============================================================
            const notifEl = document.getElementById('iosNotif');
            const notifIcon = document.getElementById('notifIcon');
            const notifTitle = document.getElementById('notifTitle');
            const notifMessage = document.getElementById('notifMessage');
            const notifTime = document.getElementById('notifTime');
            const notifClose = document.getElementById('notifClose');

            let notifTimeout = null;
            let redirectTimeout = null;

            function showNotification(type, title, message) {
                if (notifTimeout) {
                    clearTimeout(notifTimeout);
                    notifTimeout = null;
                }

                const iconMap = {
                    success: { icon: 'fa-check-circle', cls: 'success' },
                    error: { icon: 'fa-exclamation-circle', cls: 'error' },
                    warning: { icon: 'fa-triangle-exclamation', cls: 'warning' },
                    info: { icon: 'fa-info-circle', cls: 'info' }
                };
                const config = iconMap[type] || iconMap.info;

                notifIcon.className = 'notif-icon ' + config.cls;
                notifIcon.innerHTML = '<i class="fas ' + config.icon + '"></i>';
                notifTitle.textContent = title || 'Notification';
                notifMessage.textContent = message || '';

                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2, '0') + ':' +
                    now.getMinutes().toString().padStart(2, '0');
                notifTime.textContent = timeStr;

                notifEl.classList.add('show');

                notifTimeout = setTimeout(function() {
                    notifEl.classList.remove('show');
                    notifTimeout = null;
                }, 5000);
            }

            notifClose.addEventListener('click', function() {
                notifEl.classList.remove('show');
                if (notifTimeout) {
                    clearTimeout(notifTimeout);
                    notifTimeout = null;
                }
                if (redirectTimeout) {
                    clearTimeout(redirectTimeout);
                    redirectTimeout = null;
                }
            });

            document.addEventListener('click', function(e) {
                if (notifEl.classList.contains('show') && !notifEl.contains(e.target)) {
                    notifEl.classList.remove('show');
                    if (notifTimeout) {
                        clearTimeout(notifTimeout);
                        notifTimeout = null;
                    }
                }
            });

            // Attach to elements with data-notif
            document.querySelectorAll('[data-notif]').forEach(function(el) {
                el.addEventListener('click', function(e) {
                    const type = this.dataset.notif || 'info';
                    const title = this.dataset.title || 'Notification';
                    const msg = this.dataset.msg || '';
                    showNotification(type, title, msg);
                });
            });

            // ============================================================
            // IMAGE PANEL SLIDE-IN (on desktop)
            // ============================================================
            const imagePanel = document.getElementById('imagePanel');

            function openPanel() {
                if (window.innerWidth > 768 && imagePanel) {
                    setTimeout(function() {
                        imagePanel.classList.add('open');
                    }, 400);
                }
            }

            window.addEventListener('load', openPanel);

            let resizeTimer;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function() {
                    if (window.innerWidth > 768 && imagePanel && !imagePanel.classList.contains('open')) {
                        imagePanel.classList.add('open');
                    }
                }, 300);
            });

            // ============================================================
            // TOGGLE PASSWORD VISIBILITY
            // ============================================================
            const toggleBtn = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('passwordInput');
            const eyeIcon = document.getElementById('eyeIcon');

            if (toggleBtn && passwordInput && eyeIcon) {
                toggleBtn.addEventListener('click', function() {
                    const isPassword = passwordInput.type === 'password';
                    passwordInput.type = isPassword ? 'text' : 'password';
                    eyeIcon.className = isPassword ? 'fas fa-eye-slash' : 'fas fa-eye';
                });
            }

            // ============================================================
            // SHAKE & VALIDATION
            // ============================================================
            const emailInput = document.getElementById('emailInput');
            const passwordInput2 = document.getElementById('passwordInput');
            const emailWrap = document.getElementById('emailWrap');
            const passwordWrap = document.getElementById('passwordWrap');
            const loginBtn = document.getElementById('loginBtn');
            const loginForm = document.getElementById('loginForm');

            function shakeElement(wrap) {
                wrap.classList.remove('shake');
                void wrap.offsetWidth;
                wrap.classList.add('shake');
                setTimeout(function() {
                    wrap.classList.remove('shake');
                }, 600);
            }

            function setError(wrap, isError) {
                if (isError) {
                    wrap.classList.add('error');
                } else {
                    wrap.classList.remove('error');
                }
            }

            emailInput.addEventListener('focus', function() { setError(emailWrap, false); });
            passwordInput2.addEventListener('focus', function() { setError(passwordWrap, false); });

            // ============================================================
            // FORM SUBMISSION WITH DASHBOARD REDIRECT
            // ============================================================
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();

                const email = emailInput.value.trim();
                const password = passwordInput2.value.trim();

                let hasError = false;

                if (email === '') {
                    setError(emailWrap, true);
                    shakeElement(emailWrap);
                    hasError = true;
                } else {
                    setError(emailWrap, false);
                }

                if (password === '') {
                    setError(passwordWrap, true);
                    shakeElement(passwordWrap);
                    hasError = true;
                } else {
                    setError(passwordWrap, false);
                }

                if (hasError) {
                    showNotification('error', 'Please fill in all fields', 'Both email and password are required.');
                    return;
                }

                loginBtn.classList.add('loading');
                loginBtn.disabled = true;

                // Simulate login API call
                setTimeout(function() {
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;

                    // Show success notification
                    showNotification('success', 'Welcome back! 🎉', 'You have successfully signed in to SMBoostly.');

                    // Clear form fields
                    emailInput.value = '';
                    passwordInput2.value = '';
                    setError(emailWrap, false);
                    setError(passwordWrap, false);

                    // Redirect to dashboard after a brief delay (so user sees the success message)
                    redirectTimeout = setTimeout(function() {
                        window.location.href = '../../dashboard/';
                    }, 1600);

                }, 1500);
            });

            // ============================================================
            // KEYBOARD SHORTCUT: Enter to submit
            // ============================================================
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const active = document.activeElement;
                    if (active && (active.id === 'emailInput' || active.id === 'passwordInput')) {
                        loginForm.dispatchEvent(new Event('submit'));
                    }
                }
            });

            // ============================================================
            // REMOVE ERROR STATE ON TYPE
            // ============================================================
            emailInput.addEventListener('input', function() {
                if (this.value.trim() !== '') setError(emailWrap, false);
            });
            passwordInput2.addEventListener('input', function() {
                if (this.value.trim() !== '') setError(passwordWrap, false);
            });

        })();
    </script>

</body>
</html>
